<style>
@import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

.og-canvas {
  width: 1200px;
  height: 630px;
  position: relative;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
}

/* Simple two-tone background */
.og-bg-cream {
  position: absolute;
  top: 0;
  left: 0;
  width: 65%;
  height: 100%;
  background: #FBFAF8;
}

.og-bg-teal {
  position: absolute;
  top: 0;
  right: 0;
  width: 35%;
  height: 100%;
  background: linear-gradient(180deg, #1E4D45 0%, #163b35 100%);
}

/* Portrait - on the dividing line */
.og-portrait-wrap {
  position: absolute;
  top: 50%;
  left: 58%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

.og-portrait {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  object-fit: cover;
  border: 8px solid #fff;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
}

/* Content - all on cream side */
.og-content {
  position: absolute;
  top: 50%;
  left: 60px;
  transform: translateY(-50%);
  z-index: 5;
  max-width: 480px;
}

.og-logo {
  width: 320px;
  height: auto;
}

.og-tagline {
  font-family: 'Permanent Marker', cursive;
  font-size: 28px;
  color: #1E4D45;
  margin-top: 12px;
  text-transform: uppercase;
}

.og-badges {
  display: flex;
  gap: 8px;
  margin-top: 18px;
}

.og-badge {
  padding: 7px 12px;
  background: #1E4D45;
  color: #fff;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  border-radius: 4px;
}

.og-badge-gold {
  background: #E3A22E;
  color: #1E4D45;
}

.og-trust {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.og-trust span {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 800;
  color: #1E4D45;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.og-trust img {
  width: 20px;
  height: 20px;
}

/* Stripes */
.og-stripe-top,
.og-stripe {
  position: absolute;
  left: 0;
  right: 0;
  height: 10px;
  background: repeating-linear-gradient(
    135deg,
    #E3A22E 0 40px,
    #1E4D45 40px 80px,
    #A88BBA 80px 120px,
    #6E4F84 120px 160px
  );
  z-index: 20;
}

.og-stripe-top { top: 0; }
.og-stripe { bottom: 0; }
</style>
