<!-- OG Share Preview - Screenshot this at 1200x630 to create og-share.png -->
<div class="og-page">
  <div class="og-card">
    <!-- Left side with branding -->
    <div class="og-left">
      <img src="logos/logo-wordmark.png" alt="The Hi Vis Bookkeeper" class="og-logo" />
      <p class="og-tagline">Bookkeeping for Trades &amp; Construction</p>
      <div class="og-badges">
        <span>Xero Partner</span>
        <span>CIS</span>

    <!-- Right side with portrait -->
    <div class="og-right">
      <img src="logos/portrait-sarah.png" alt="Sarah - The Hi Vis Bookkeeper" class="og-portrait" />
    </div>

    <!-- Bottom stripe -->
    <div class="og-bottom">
      <div class="og-checks">
        <img src="logos/check-pin-teal.png" alt="" />
        <span>Accurate</span>
        <img src="logos/check-pin-lilac.png" alt="" />

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.og-page {
  width: 1200px;
  height: 630px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #FBFAF8;
}

.og-card {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #FBFAF8 0%, #fff 100%);
  display: grid;
  grid-template-columns: 1.3fr 0.7fr;
  grid-template-rows: 1fr auto;
  position: relative;
  overflow: hidden;
}

/* Accent stripe top */
.og-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 10px;
  background: repeating-linear-gradient(45deg, #1E4D45 0 14px, #A88BBA 14px 28px, #E3A22E 28px 42px, #6E4F84 42px 56px);
}

.og-left {
  padding: 60px 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.og-logo {
  width: 340px;
  height: auto;
}

.og-tagline {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #6E4F84;
  text-transform: uppercase;
  letter-spacing: 1.8px;
  margin-top: 16px;
}

.og-badges {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}

.og-badges span {
  padding: 8px 16px;
  border-radius: 30px;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  background: #1E4D45;
  color: #fff;
}

.og-right {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 30px 50px 30px 0;
}

.og-portrait {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #1E4D45;
  box-shadow: 0 12px 40px rgba(30,77,69,0.3);
}

.og-bottom {
  grid-column: 1 / -1;
  background: linear-gradient(135deg, #1E4D45 0%, #6E4F84 100%);
  padding: 20px 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.og-checks {
  display: flex;
  align-items: center;
  gap: 12px;
}

.og-checks img {
  width: 28px;
  height: 28px;
}

.og-checks span {
  font-family: 'Permanent Marker', cursive;
  font-size: 18px;
  color: #E3A22E;
  text-transform: uppercase;
  margin-right: 16px;
}

.og-url {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
}
</style>
