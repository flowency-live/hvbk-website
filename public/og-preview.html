<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Share Preview | The Hi Vis Bookkeeper</title>
<meta name="description" content="Screenshot this page at 1200x630 to create og-share.png" />
<!-- Open Graph / WhatsApp / Social sharing -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://www.hivisbooks.co.uk/" />
<meta property="og:title" content="The Hi Vis Bookkeeper" />
<meta property="og:description" content="Specialist bookkeeping for trades and construction. Xero certified. CIS, VAT, MTD. Accurate, compliant, HMRC ready." />
<meta property="og:image" content="https://www.hivisbooks.co.uk/logos/og-share.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />
<meta name="theme-color" content="#1E4D45" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />

</head>
<body>
<!-- OG Share Preview - Screenshot this at 1200x630 to create og-share.png -->
<div class="og-canvas">
  <!-- Top stripe -->
  <div class="og-stripe-top"></div>

  <!-- Background layers -->
  <div class="og-bg-teal"></div>
  <div class="og-bg-diagonal"></div>
  <div class="og-texture"></div>

  <!-- Portrait hero -->
  <div class="og-portrait-wrap">
    <div class="og-portrait-ring"></div>
    <img src="logos/portrait-sarah.png" alt="Sarah" class="og-portrait" />
  </div>

  <!-- Content block -->
  <div class="og-content">
    <img src="logos/logo-wordmark.png" alt="The Hi Vis Bookkeeper" class="og-logo" />

    <div class="og-tagline">
      <span class="og-tag-text">Bookkeeping for</span>
      <span class="og-tag-highlight">Trades & Construction</span>
    </div>

    <div class="og-badges">
      <span class="og-badge og-badge-gold">Xero Partner</span>
      <span class="og-badge">CIS</span>
      <span class="og-badge">VAT</span>
      <span class="og-badge">MTD</span>
    </div>
  </div>

  <!-- Trust strip -->
  <div class="og-trust">
    <div class="og-trust-item">
      <img src="logos/check-pin-teal.png" alt="" />
      <span>Accurate</span>
    </div>
    <div class="og-trust-item">
      <img src="logos/check-pin-lilac.png" alt="" />
      <span>Compliant</span>
    </div>
    <div class="og-trust-item">
      <img src="logos/check-pin-yellow.png" alt="" />
      <span>HMRC Ready</span>
    </div>
  </div>

  <!-- URL -->
  <div class="og-url">www.hivisbooks.co.uk</div>

  <!-- Accent stripe -->
  <div class="og-stripe"></div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

.og-canvas {
  width: 1200px;
  height: 630px;
  position: relative;
  overflow: hidden;
  background: #FBFAF8;
  font-family: 'Inter', system-ui, sans-serif;
}

/* Background layers */
.og-bg-teal {
  position: absolute;
  top: 0;
  right: 0;
  width: 55%;
  height: 100%;
  background: linear-gradient(160deg, #1E4D45 0%, #163b35 100%);
  clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);
}

.og-bg-diagonal {
  position: absolute;
  top: 0;
  right: 0;
  width: 58%;
  height: 100%;
  background: linear-gradient(160deg, #6E4F84 0%, #5a4170 100%);
  clip-path: polygon(20% 0, 100% 0, 100% 85%, 5% 100%);
  opacity: 0.15;
}

.og-texture {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 80% 20%, rgba(227, 162, 46, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 20% 80%, rgba(168, 139, 186, 0.06) 0%, transparent 30%);
  pointer-events: none;
}

/* Portrait */
.og-portrait-wrap {
  position: absolute;
  top: 50%;
  right: 100px;
  transform: translateY(-50%);
  z-index: 10;
}

.og-portrait-ring {
  position: absolute;
  top: -15px;
  left: -15px;
  right: -15px;
  bottom: -15px;
  border: 4px solid rgba(227, 162, 46, 0.6);
  border-radius: 50%;
  animation: none;
}

.og-portrait {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  object-fit: cover;
  border: 6px solid #fff;
  box-shadow:
    0 25px 60px rgba(30, 77, 69, 0.4),
    0 10px 25px rgba(0, 0, 0, 0.15),
    inset 0 0 0 2px rgba(30, 77, 69, 0.1);
}

/* Content */
.og-content {
  position: absolute;
  top: 40px;
  left: 60px;
  z-index: 5;
  max-width: 550px;
}

.og-logo {
  width: 420px;
  height: auto;
  filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.08));
}

.og-tagline {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.og-tag-text {
  font-size: 18px;
  font-weight: 700;
  color: #6E4F84;
  text-transform: uppercase;
  letter-spacing: 3px;
}

.og-tag-highlight {
  font-family: 'Permanent Marker', cursive;
  font-size: 38px;
  color: #1E4D45;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.og-badges {
  display: flex;
  gap: 12px;
  margin-top: 28px;
  flex-wrap: wrap;
}

.og-badge {
  padding: 10px 18px;
  background: #1E4D45;
  color: #fff;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 6px;
  box-shadow: 0 3px 0 #163b35;
}

.og-badge-gold {
  background: #E3A22E;
  color: #1E4D45;
  box-shadow: 0 3px 0 #C9871A;
}

/* Trust strip */
.og-trust {
  position: absolute;
  bottom: 20px;
  left: 60px;
  display: flex;
  gap: 28px;
  z-index: 5;
}

.og-trust-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.og-trust-item img {
  width: 26px;
  height: 26px;
}

.og-trust-item span {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: #1E4D45;
  text-transform: uppercase;
}

/* URL */
.og-url {
  position: absolute;
  bottom: 24px;
  right: 50px;
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
  z-index: 10;
}

/* Accent stripes - diagonal like brushbar */
.og-stripe-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: repeating-linear-gradient(
    135deg,
    #E3A22E 0 40px,
    #1E4D45 40px 80px,
    #A88BBA 80px 120px,
    #6E4F84 120px 160px
  );
  z-index: 20;
}

.og-stripe {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: repeating-linear-gradient(
    135deg,
    #E3A22E 0 40px,
    #1E4D45 40px 80px,
    #A88BBA 80px 120px,
    #6E4F84 120px 160px
  );
  z-index: 20;
}
</style>

</body>
</html>
