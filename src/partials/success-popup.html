<!-- Success Popup Modal -->
<div class="success-popup" id="successPopup">
  <div class="success-popup-overlay"></div>
  <div class="success-popup-card">
    <button class="success-close" onclick="closeSuccessPopup()" aria-label="Close">×</button>
    <div class="success-icon">
      <svg viewBox="0 0 100 100" class="success-check">
        <circle class="success-check-bg" cx="50" cy="50" r="45" />
        <path class="success-check-mark" d="M25 52 L42 68 L75 32" />
      </svg>
    </div>
    <div class="success-content">
      <h3 class="success-title">Thanks! Your enquiry is in.</h3>
      <p class="success-message">We'll be in touch very soon.</p>
    </div>
    <div class="success-progress"></div>
  </div>
</div>
