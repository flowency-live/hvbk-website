<div class="modal" id="loginModal" onclick="if(event.target===this)closeLogin()">
  <div class="modal-card">
    <div class="modal-top">
      <b>Client Login</b>
      <button class="close-x" aria-label="Close" onclick="closeLogin()">&times;</button>
    </div>
    <div class="modal-body">
      <label for="l-user">Username</label>
      <input id="l-user" type="text" placeholder="yourname" />
      <label for="l-pass">Password</label>
      <input id="l-pass" type="password" placeholder="********" />
      <a href="https://cbk-crm.vercel.app/login" class="btn btn-yellow" style="width:100%;justify-content:center">Sign in</a>
      <p style="text-align:center;font-size:12px;color:#777;margin-top:14px">Secure client portal &middot; The Hi Vis Bookkeeper</p>
    </div>
  </div>
</div>
